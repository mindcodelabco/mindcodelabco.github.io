<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>کاویدا 🌱 - رشد و خودشناسی</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet"
    integrity="sha384-h1N6V2vWdQ2oQk3YspKzD2tzBA4gF3i6Doxr6K2y2bH8rQv1V4F6lN7D0lZ0e6sF" crossorigin="anonymous">
  <!-- Vazir Font CDN -->
  <link href="https://cdn.jsdelivr.net/npm/vazir-font@32.105.0/dist/font-face.css" rel="stylesheet"
    integrity="sha384-YourIntegrityHere" crossorigin="anonymous">
  <style>
    @font-face {
      font-family: 'Vazir';
      src: url('./assets/fonts/Vazir-Bold.woff2') format('woff2'),
        url('./assets/fonts/Vazir-Bold.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'Vazir', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-size: cover;
    }

    .hero-section {
      text-align: center;
      padding: 20px;
      color: #333;
    }

    .text-overlay {
      background-color: rgba(255, 255, 255, 0.8);
      /* Semi-transparent white background for readability */
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    .hero-section h1 {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0;
    }

    .hero-section p {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .btn-telegram {
      background-color: #18cf18;
      /* mint green */
      color: white;
      /* earthy text */
      font-size: 1.1rem;
      padding: 10px 20px;
      border-radius: 25px;
      transition: transform 0.3s ease, background-color 0.3s ease;
      display: inline-block;
    }

    .btn-telegram:hover {
      background-color: #27b927;
      /* darker mint green */
      transform: scale(1.05);
    }

    .app-image,
    .logo-image {
      max-width: 100%;
      height: auto;
      margin: 20px auto;
      display: block;
    }

    .footer {
      background-color: #1f492b;
      color: white;
      padding: 20px 0;
      text-align: center;
      width: 100%;
      position: fixed;
      bottom: 0;
    }
  </style>
</head>

<body>
  <!-- Hero Section -->
  <section class="hero-section">
    <div class="text-overlay">
      <img src="./assets/img/logo.png" alt="Kavida Logo" class="logo-image img-fluid" style="max-width: 200px;">
      <h1>کاویدا 🌱 - جایی برای رشد و خودشناسی</h1>
      <p>پلتفرمی هوشمند برای کشف خود، هدف‌گذاری، و ارتباطات معنادار!</p>
      <a href="https://t.me/kavidabot" class="btn btn-telegram" target="_blank">اکنون به بات تلگرام بپیوندید</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2025 کاویدا. تمامی حقوق محفوظ است.</p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
